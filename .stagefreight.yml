version: 1

vars:
  org: hlhd
  github_org: HomeLabHD
  gitlab_group: PrPlanIT/HomeLabHD
  repo: ansible

sources:
  primary:
    kind: git
    worktree: "."
    url: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}"
    default_branch: "main"

  accessories:
    - id: github
      provider: github
      url: "https://github.com"
      project_id: "{var:github_org}/{var:repo}"
      credentials: GITHUB
      sync:
        git: true

policies:
  git_tags:
    stable: "^\\d+\\.\\d+\\.\\d+-v\\d+$"
  branches:
    main: "^main$"

builds:
  - id: ansible
    kind: docker
    platforms: [linux/amd64]

targets:
  # ── Docker Hub: stable releases ─────────────────────────────────
  - id: dockerhub-stable
    kind: registry
    build: ansible
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: dev builds on every commit ──────────────────────
  - id: dockerhub-dev
    kind: registry
    build: ansible
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"
      - "latest-dev"
    when: { branches: [main], events: [push] }
    credentials: DOCKER
    retention:
      keep_last: 5
      protect: ["latest-dev"]

  # ── Docker Hub: README sync ─────────────────────────────────────
  - id: dockerhub-readme
    kind: docker-readme
    url: docker.io
    path: "{var:org}/{var:repo}"
    credentials: DOCKER
    when: { branches: [main], events: [push, tag] }
    file: "README.md"
    description: "Lightweight Alpine-based Ansible image with Windows support and community collections"
    link_base: "https://github.com/{var:github_org}/{var:repo}/blob/main"

  # ── GitLab component catalog ─────────────────────────────────────
  - id: gitlab-catalog
    kind: gitlab-component
    when: { branches: [main], events: [push] }
    spec_files: ["templates/run.yml", "templates/test.yml"]
    catalog: true

  # ── Primary release ─────────────────────────────────────────────
  - id: primary-release
    kind: release
    aliases: ["latest"]
    when: { git_tags: [stable], events: [tag] }

  # ── GitHub release sync ──────────────────────────────────────────
  - id: github-release
    kind: release
    provider: github
    url: https://github.com
    project_id: "{var:github_org}/{var:repo}"
    credentials: GITHUB
    sync_release: true
    sync_assets: true
    when: { git_tags: [stable], events: [tag] }

narrator:
  - file: "README.md"
    link_base: "https://github.com/{var:github_org}/{var:repo}/blob/main"
    items:
      # ── Project section (repo health & sources) ─────────────────
      - id: project.github
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitHub-source-181717?logo=github"
        link: "https://github.com/{var:github_org}/{var:repo}"

      - id: project.gitlab
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitLab-source-FC6D26?logo=gitlab"
        link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}"

      - id: project.last-commit
        kind: props
        type: github-last-commit
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:repo}"

      - id: project.issues-open
        kind: props
        type: github-issues-open
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:repo}"

      - id: project.prs-open
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "github/issues-pr/{var:github_org}/{var:repo}"

      - id: project.contributors
        kind: props
        type: github-contributors
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:github_org}/{var:repo}"

      # ── Status badges ───────────────────────────────────────────
      - id: badge.build
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: build
        value: "{env:BUILD_STATUS}"
        color: auto
        font: monofur
        output: ".stagefreight/badges/build.svg"
        link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}/-/pipelines"

      - id: badge.license
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: license
        value: "GPL-3.0"
        color: "#310937"
        font: monofur
        output: ".stagefreight/badges/license.svg"
        link: LICENSE

      - id: badge.release
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: release
        value: "{base}"
        color: "#74ecbe"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/release.svg"
        link: "https://github.com/{var:github_org}/{var:repo}/releases"

      - id: badge.updated
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: updated
        value: "{env:BUILD_DATE}"
        color: "#236144"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/updated.svg"

      - id: shield.donate
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/donate-FF5E5B?logo=ko-fi&logoColor=white"
        link: "https://ko-fi.com/T6T41IT163"

      - id: shield.sponsor
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/sponsor-EA4AAA?logo=githubsponsors&logoColor=white"
        link: "https://github.com/sponsors/{var:github_org}"

      # ── Image section ───────────────────────────────────────────
      # Row 1: Docker image + pulls
      - id: image.docker
        kind: shield
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        shield: "badge/Docker-{var:org}%2F{var:repo}-2496ED?logo=docker&logoColor=white"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.pulls
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: pulls
        value: "{docker.pulls}"
        color: "#1d63ed"
        output: ".stagefreight/badges/pulls.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.break1
        kind: break
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      # Row 2: All tag badges (release + dev)
      - id: image.release-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest
        value: "{base}"
        color: "#74ecbe"
        output: ".stagefreight/badges/latest.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest"

      - id: image.release-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.{base}.updated}"
        color: "#236144"
        output: ".stagefreight/badges/release-updated.svg"

      - id: image.release-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.{base}.size}"
        color: "#555"
        output: ".stagefreight/badges/release-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name={base}"

      # Dev badges (same row)
      - id: image.dev-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest-dev
        value: "dev-{sha:8}"
        color: "#3b82f6"
        output: ".stagefreight/badges/latest-dev.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

      - id: image.dev-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.latest-dev.updated}"
        color: "#236144"
        output: ".stagefreight/badges/dev-updated.svg"

      - id: image.dev-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.latest-dev.size}"
        color: "#555"
        output: ".stagefreight/badges/dev-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

      # ── Build contents: base image versions ────────────────────
      - id: contents.versions
        kind: build-contents
        placement:
          between: ["<!-- sf:versions:start -->", "<!-- sf:versions:end -->"]
          mode: replace
        section: "inventories.versions"
        renderer: versions
        wrap: details
        summary: "Base image"

      # ── Build contents: system packages (apk) ─────────────────
      - id: contents.apk
        kind: build-contents
        placement:
          between: ["<!-- sf:apk:start -->", "<!-- sf:apk:end -->"]
          mode: replace
        section: "inventories.apk"
        renderer: badges

      # ── Build contents: python packages (pip) ──────────────────
      - id: contents.pip
        kind: build-contents
        placement:
          between: ["<!-- sf:pip:start -->", "<!-- sf:pip:end -->"]
          mode: replace
        section: "inventories.pip"
        renderer: badges

      # ── Build contents: ansible collections (galaxy) ───────────
      - id: contents.galaxy
        kind: build-contents
        placement:
          between: ["<!-- sf:galaxy:start -->", "<!-- sf:galaxy:end -->"]
          mode: replace
        section: "inventories.galaxy"
        renderer: badges

      # ── Build contents: binary tools ───────────────────────────
      - id: contents.binaries
        kind: build-contents
        placement:
          between: ["<!-- sf:binaries:start -->", "<!-- sf:binaries:end -->"]
          mode: replace
        section: "inventories.binaries"
        renderer: badges

  - file: "docs/Usage.md"
    items:
      # ── Tools: pip + binaries combined ──────────────────────────
      - id: usage.tools
        kind: build-contents
        placement:
          between: ["<!-- sf:usage-tools:start -->", "<!-- sf:usage-tools:end -->"]
          mode: replace
        section: "inventories.pip"
        renderer: badges

      # ── Collections: galaxy ─────────────────────────────────────
      - id: usage.galaxy
        kind: build-contents
        placement:
          between: ["<!-- sf:usage-galaxy:start -->", "<!-- sf:usage-galaxy:end -->"]
          mode: replace
        section: "inventories.galaxy"
        renderer: badges

manifest:
  enabled: true
  mode: workspace

lint:
  level: full

security:
  enabled: true
  sbom: true
  release_detail: full

commit:
  default_type: docs
  conventional: true
  backend: git
