---
spec:
  inputs:
    # input_section_name- Job Configuration
    # input_section_desc- Inputs that configure GitLab job behavior
    job:
      description: 'Job name for the CI pipeline.'
      default: run-ansible
    stage:
      description: 'CI stage this job runs in.'
      default: ansible
    image:
      description: 'Docker image to use for execution.'
      default: docker.io/hlhd/ansible:latest
    artifacts:
      description: 'Paths to preserve as CI/CD artifacts.'
      type: array
      default: []
    rules:
      description: 'When to run this job (GitLab rules array).'
      type: array
      default:
        - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

    # input_section_name- Ansible Configuration
    # input_section_desc- Settings for Ansible playbook execution
    ansible_playbook:
      description: 'Path to the playbook file to execute.'
    ansible_inventory:
      description: 'Path to the inventory file.'
      default: ansible/inventory
    ansible_host_key_checking:
      description: 'Enable SSH host key checking. Disable only in trusted environments.'
      default: 'false'
    ansible_extra_vars:
      description: 'Extra variables to pass to ansible-playbook (-e key=value, space-separated).'
      default: ''
    working_dir:
      description: 'Working directory for ansible execution.'
      default: ''

    # input_section_name- Authentication
    # input_section_desc- Credentials for SSH, SOPS, GitLab API, and Windows targets
    ssh_private_key:
      description: 'CI/CD file variable containing the SSH private key.'
      default: ''
    sops_age_key_file:
      description: 'CI/CD file variable containing the Age key for SOPS decryption.'
      default: ''
    gitlab_token:
      description: 'Token for authenticating GitLab API calls.'
      default: ''
    gitlab_branch:
      description: 'Target Git branch for commits via GitLab API.'
      default: $CI_DEFAULT_BRANCH
    windows_password:
      description: 'Password for WinRM connections to Windows hosts.'
      default: ''

---

'$[[ inputs.job ]]':
  stage: '$[[ inputs.stage ]]'
  image:
    name: '$[[ inputs.image ]]'
    entrypoint: [""]
  artifacts:
    when: always
    paths: $[[ inputs.artifacts ]]
  rules: $[[ inputs.rules ]]
  variables:
    ANSIBLE_HOST_KEY_CHECKING: '$[[ inputs.ansible_host_key_checking ]]'

  before_script:
    - |
      # SSH agent setup (only when key is provided)
      if [ -n "$SSH_PRIVATE_KEY" ] && [ -f "$SSH_PRIVATE_KEY" ]; then
        eval "$(ssh-agent -s)" > /dev/null
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
        chmod 400 ~/.ssh/id_rsa
        ssh-add ~/.ssh/id_rsa 2>/dev/null
      fi

      # SOPS Age key setup (only when key file is provided)
      if [ -n "$SOPS_AGE_KEY_FILE" ] && [ -f "$SOPS_AGE_KEY_FILE" ]; then
        export SOPS_AGE_KEY_FILE
      fi

  script:
    - |
      EXTRA_ARGS=""

      # Working directory
      if [ -n "$[[ inputs.working_dir ]]" ]; then
        cd "$[[ inputs.working_dir ]]"
      fi

      # GitLab context variables (available to playbooks via -e)
      EXTRA_ARGS="$EXTRA_ARGS -e ci_commit_ref_name=${CI_COMMIT_REF_NAME}"
      EXTRA_ARGS="$EXTRA_ARGS -e ci_commit_tag=${CI_COMMIT_TAG:-}"
      EXTRA_ARGS="$EXTRA_ARGS -e ci_project_dir=${CI_PROJECT_DIR}"
      EXTRA_ARGS="$EXTRA_ARGS -e gitlab_api_url=${CI_API_V4_URL}"
      EXTRA_ARGS="$EXTRA_ARGS -e gitlab_branch=$[[ inputs.gitlab_branch ]]"
      EXTRA_ARGS="$EXTRA_ARGS -e gitlab_project_id=${CI_PROJECT_ID}"

      if [ -n "$[[ inputs.gitlab_token ]]" ]; then
        EXTRA_ARGS="$EXTRA_ARGS -e gitlab_token=$[[ inputs.gitlab_token ]]"
      fi

      if [ -n "$[[ inputs.windows_password ]]" ]; then
        EXTRA_ARGS="$EXTRA_ARGS -e ansible_windows_password=$[[ inputs.windows_password ]]"
      fi

      # User-provided extra vars
      if [ -n "$[[ inputs.ansible_extra_vars ]]" ]; then
        for var in $[[ inputs.ansible_extra_vars ]]; do
          EXTRA_ARGS="$EXTRA_ARGS -e $var"
        done
      fi

      ansible-playbook \
        -i "$[[ inputs.ansible_inventory ]]" \
        "$[[ inputs.ansible_playbook ]]" \
        $EXTRA_ARGS
