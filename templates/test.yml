---
spec:
  inputs:
    # input_section_name- Job Configuration
    # input_section_desc- Inputs that configure GitLab job behavior
    job:
      description: 'Job name for the CI pipeline.'
      default: test-ansible
    stage:
      description: 'CI stage this job runs in.'
      default: test
    image:
      description: 'Docker image to use for linting.'
      default: docker.io/hlhd/ansible:latest
    rules:
      description: 'When to run this job (GitLab rules array).'
      type: array
      default:
        - if: '$CI_PIPELINE_SOURCE == "push"'
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

    # input_section_name- Ansible Configuration
    # input_section_desc- Settings for Ansible linting
    playbook:
      description: 'Path to the playbook file to lint.'
    root_dir:
      description: 'Root directory containing Ansible config and playbooks.'
      default: ansible

---

'$[[ inputs.job ]]':
  stage: '$[[ inputs.stage ]]'
  image:
    name: '$[[ inputs.image ]]'
    entrypoint: [""]
  rules: $[[ inputs.rules ]]
  script:
    - cd "$[[ inputs.root_dir ]]"
    - ansible-lint "$[[ inputs.playbook ]]"
